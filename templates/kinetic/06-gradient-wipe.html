<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Gradient Wipe Highlight</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
  }

  #canvas {
    position: relative;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
  }

  #line-container {
    position: absolute;
    bottom: 160px;
    left: 100px;
    right: 100px;
    text-align: center;
  }

  .wipe-word {
    display: inline-block;
    position: relative;
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 72px;
    margin: 0 10px;
    color: rgba(255, 255, 255, 0.3);
    text-shadow:
      0 0 20px rgba(0,0,0,0.8),
      0 2px 8px rgba(0,0,0,0.6);
    will-change: color;
  }

  /* The highlighted version overlaid via background-clip */
  .wipe-word .highlight-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(
      90deg,
      #e8c547 0%,
      #ffffff 40%,
      #e8c547 50%,
      rgba(255,255,255,0.3) 50.1%,
      rgba(255,255,255,0.3) 100%
    );
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-family: inherit;
    font-weight: inherit;
    font-size: inherit;
    letter-spacing: inherit;
    text-shadow: none;
    will-change: background-position;
  }

  /* Glow edge effect — a pseudo-element that follows the wipe position */
  .wipe-word .glow-edge {
    position: absolute;
    top: 50%;
    width: 6px;
    height: 120%;
    transform: translateY(-50%);
    background: radial-gradient(ellipse at center, rgba(232, 197, 71, 0.8) 0%, rgba(232, 197, 71, 0) 70%);
    filter: blur(8px);
    opacity: 0;
    pointer-events: none;
    will-change: left, opacity;
  }

  #prev-line {
    position: absolute;
    bottom: 260px;
    left: 100px;
    right: 100px;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 52px;
    color: rgba(255, 255, 255, 0.15);
    text-shadow:
      0 0 15px rgba(0,0,0,0.6),
      0 2px 4px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>
<div id="canvas">
  <div id="prev-line"></div>
  <div id="line-container"></div>
</div>

<script>
/**
 * GRADIENT WIPE HIGHLIGHT TEMPLATE
 *
 * Like cinematic karaoke: a gradient color wipe moves across each word
 * as it's being sung, with a glowing leading edge. Words start dim,
 * the wipe passes through revealing full brightness and gold,
 * then the word stays lit.
 *
 * Best for: R&B, pop ballads, karaoke-style lyric videos, sing-alongs.
 */

var W = 1920;
var H = 1080;

var elements = [];
var currentLineIdx = -1;
var prevLineText = '';

function buildLine(line) {
  var container = document.getElementById('line-container');
  var prevEl = document.getElementById('prev-line');

  // Move current text to prev line
  if (container.textContent.trim()) {
    prevLineText = container.textContent;
    prevEl.textContent = prevLineText;
  }

  while (container.firstChild) {
    container.removeChild(container.firstChild);
  }
  elements = [];

  var words = line.words || [];
  var fontSize = words.length <= 5 ? 80 : words.length <= 8 ? 64 : 52;

  words.forEach(function(word) {
    var wrapper = document.createElement('span');
    wrapper.className = 'wipe-word';
    wrapper.style.fontSize = fontSize + 'px';

    // Base text (dim, behind)
    var baseText = document.createTextNode(word.text);
    wrapper.appendChild(baseText);

    // Highlight layer (gradient clip)
    var highlight = document.createElement('span');
    highlight.className = 'highlight-layer';
    highlight.textContent = word.text;
    highlight.style.backgroundPosition = '100% 0'; // start fully unwiped
    wrapper.appendChild(highlight);

    // Glow edge
    var glow = document.createElement('span');
    glow.className = 'glow-edge';
    wrapper.appendChild(glow);

    wrapper.dataset.startTime = String(word.startTime);
    wrapper.dataset.endTime = String(word.endTime);

    container.appendChild(wrapper);
    elements.push({
      wrapper: wrapper,
      highlight: highlight,
      glow: glow,
      startTime: word.startTime,
      endTime: word.endTime
    });
  });
}

window.renderFrame = function(time) {
  time = time || window.FRAME_TIME || 0;
  var data = window.LYRICS_DATA;
  if (!data || !data.lines) { return; }

  // Find active line
  var activeLineIdx = -1;
  for (var i = 0; i < data.lines.length; i++) {
    var line = data.lines[i];
    if (time >= line.startTime && time < line.endTime) {
      activeLineIdx = i;
      break;
    }
  }

  if (activeLineIdx === -1) {
    if (currentLineIdx !== -1) {
      // Fade out
      elements.forEach(function(item) {
        item.wrapper.style.opacity = '0';
      });
      currentLineIdx = -1;
    }
    return;
  }

  if (activeLineIdx !== currentLineIdx) {
    currentLineIdx = activeLineIdx;
    buildLine(data.lines[activeLineIdx]);
  }

  var activeLine = data.lines[activeLineIdx];

  elements.forEach(function(item) {
    var wordStart = item.startTime;
    var wordEnd = item.endTime;
    var wordDuration = wordEnd - wordStart;

    item.wrapper.style.opacity = '1';

    if (time < wordStart) {
      // Not yet — show dim
      item.highlight.style.backgroundPosition = '100% 0';
      item.glow.style.opacity = '0';
    } else if (time >= wordEnd) {
      // Fully wiped — stay lit
      item.highlight.style.backgroundPosition = '0% 0';
      item.glow.style.opacity = '0';
    } else {
      // Wiping in progress
      var progress = (time - wordStart) / wordDuration;
      // background-position goes from 100% (unwiped) to 0% (fully wiped)
      var bgPos = 100 - progress * 100;
      item.highlight.style.backgroundPosition = bgPos + '% 0';

      // Glow edge position follows the wipe
      var wrapperWidth = item.wrapper.offsetWidth || 200;
      var glowX = progress * wrapperWidth;
      item.glow.style.left = glowX + 'px';
      item.glow.style.opacity = '1';
    }

    // Fade out near line end
    var fadeStart = activeLine.endTime - 0.3;
    if (time > fadeStart) {
      var fadeProgress = (time - fadeStart) / 0.3;
      item.wrapper.style.opacity = String(Math.max(0, 1 - fadeProgress));
    }
  });

  // Fade prev line
  var prevEl = document.getElementById('prev-line');
  var fadeInProgress = Math.min(1, (time - activeLine.startTime) / 0.5);
  prevEl.style.opacity = String(0.15 * (1 - fadeInProgress * 0.5));
};

(function preview() {
  if (window.FRAME_TIME !== undefined) {
    window.renderFrame(window.FRAME_TIME);
  }
  requestAnimationFrame(preview);
})();
</script>
</body>
</html>
